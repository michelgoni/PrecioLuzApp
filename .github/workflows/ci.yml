name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project PrecioLuzApp.xcodeproj -scheme PrecioLuzApp

      - name: Build
        run: |
          xcodebuild \
            -project PrecioLuzApp.xcodeproj \
            -scheme PrecioLuzApp \
            -destination "generic/platform=iOS Simulator" \
            build

      - name: Test
        run: |
          xcodebuild \
            -project PrecioLuzApp.xcodeproj \
            -scheme PrecioLuzApp \
            -destination "generic/platform=iOS Simulator" \
            test
